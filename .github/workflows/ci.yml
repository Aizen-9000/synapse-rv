name: Synapse-RV CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  simulate:
    name: RTL Simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Run NPU PE tests
        run: |
          mkdir -p build
          iverilog -g2012 -DSIMULATION rtl/npu/npu_pe.v sim/npu_pe_tb.v -o build/sim_pe
          vvp build/sim_pe | tee build/npu_pe_results.txt
          grep -q "PASS" build/npu_pe_results.txt

      - name: Run NPU system tests
        run: |
          iverilog -g2012 -DSIMULATION \
            rtl/npu/npu_pe.v rtl/npu/npu_systolic_array.v \
            rtl/npu/npu_weight_buffer.v rtl/npu/npu_activation.v \
            rtl/npu/npu_ctrl.v rtl/npu/npu_top.v \
            rtl/memory/generic_sram.v \
            sim/npu_system_tb.v -o build/sim_npu
          vvp build/sim_npu | tee build/npu_sys_results.txt
          grep -q "PASS" build/npu_sys_results.txt

      - name: Run UART tests
        run: |
          iverilog -g2012 rtl/periph/uart16550.v sim/uart_tb.v -o build/sim_uart
          vvp build/sim_uart | tee build/uart_results.txt
          grep -q "PASS" build/uart_results.txt

  lint:
    name: Verilog Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator

      - name: Lint NPU PE
        run: |
          verilator --lint-only -Wall --top-module npu_pe rtl/npu/npu_pe.v 2>&1 | tee build/lint_npu_pe.log || true
          echo "Lint complete"

  synthesis:
    name: Yosys Synthesis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Yosys
        run: sudo apt-get update && sudo apt-get install -y yosys

      - name: Synthesize NPU PE
        run: |
          mkdir -p build/syn
          yosys -p "
            read_verilog rtl/npu/npu_pe.v
            synth -top npu_pe
            stat
          " 2>&1 | tee build/syn/npu_pe_synth.log
          grep -q "Number of cells" build/syn/npu_pe_synth.log

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: synthesis-reports
          path: build/syn/
